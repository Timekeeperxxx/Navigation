pcl_publisher:
  ros__parameters:
    global_frame: "map"
    map_rotate_around_x: 0.0
    map_rotate_around_y: 0.0
    map_rotate_around_z: 0.0
    map_translate_x: 0.0
    map_translate_y: 0.0
    map_translate_z: 0.0
    ground_rotate_around_x: 0.0
    ground_rotate_around_y: 0.0
    ground_rotate_around_z: 0.0
    ground_translate_x: 0.0
    ground_translate_y: 0.0
    ground_translate_z: 0.0
    map_down_sample: 0.2
    ground_down_sample: 0.1
    planground_down_sample: 0.1


perception_3d_global:
  ros__parameters:
    global_frame: "map"
    robot_base_frame: "base_footprint"
    max_obstacle_distance: 9999.0
    inscribed_radius: 0.1
    inflation_descending_rate: 2.0
    inflation_radius: 1.5
    sensors_collected_frequency: 5.0
    plugins: ["map"]
    map:
      plugin: "perception_3d::StaticLayer"
      use_adaptive_connection: true #If true: the neighbors of node is sparse, it will automatically increase search radius.
      adaptive_connection_number: 20
      radius_of_ground_connection: 4.1 #If use_adaptive_connection=false, the radius search of the node is applied.
      intensity_search_radius: 1.0 #this value is suggested to be 1.0 meters, because if it is too large, the narrow passage will be miscalculated
      intensity_search_punish_weight: 0.5 #the weight for a node. Set this value higher means we dont like path planning cross a orphan node.
      static_imposing_radius: 0.2
      map_topic: "mapcloud"
      ground_topic: "mapground"
      support:
        mapping_mode: false
          #if mapping mode is true, edge detection is automatically disabled
        enable_edge_detection: true
        generate_static_graph: false
          #the connection radius will be used
          #enable this value when using super dense ground say ground voxel size<=10 cm

      
global_planner:
  ros__parameters:
    turning_weight: 0.1 #Punish the zig-zag path
    a_star_expanding_radius: 0.05
    roi_file_path: ""
    roi_radius: 1.0   # Radius for circular ROI (if using pointInROI)
    roi_z_tolerance: 0.2 # Z tolerance for ROI checking

    #@ Planground parameters
    planground_search_radius: 0.1
    planground_fallback_ratio: 0.3
    planground_downsample_leaf_size: 0.2

    #@ Hybrid planning parameters (v24 - Ultra-Strong Planground Preference with Maximum Anti-Detour 加强版)
    use_hybrid_planner: true
    hybrid_planground_bias: 15.0
    hybrid_downsample_leaf_size: 0.15
    hybrid_max_ground_bridge_length: 0.12
    hybrid_max_ground_cost: 250.0
    hybrid_min_ground_cost: 150.0
    hybrid_detour_ratio_threshold: 4.0
    hybrid_distance_balance_threshold: 1.5
    hybrid_ground_path_length_penalty: 5.0
    hybrid_detour_balance_factor_lower_bound: 0.5
    hybrid_detour_balance_factor_upper_bound: 3.0

    #@ v25 Edge penalty parameters - penalize ground points near cloud edges
    hybrid_edge_penalty_radius: 0.1
    hybrid_edge_penalty_weight: 200.0
    hybrid_edge_penalty_falloff_rate: 2.0
