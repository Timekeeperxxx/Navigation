# terrain_analysis 统一参数。
# 建图保存时默认启用动态障碍清理和地面点去重，运行期可按场景调整。

terrainAnalysis:
  ros__parameters:
    scanVoxelSize: 0.05
    decayTime: 5.0
    noDecayDis: 1.75
    clearingDis: 8.0
    useSorting: true
    quantileZ: 0.35
    considerDrop: false
    limitGroundLift: false
    maxGroundLift: 0.15
    clearDyObs: true
    minDyObsDis: 0.3
    minDyObsAngle: 0.0
    minDyObsRelZ: -0.3
    absDyObsRelZThre: 0.2
    minDyObsVFOV: -28.0
    maxDyObsVFOV: 33.0
    minDyObsPointNum: 1
    noDataObstacle: false
    noDataBlockSkipNum: 0
    minBlockPointNum: 10
    vehicleHeight: 0.3
    voxelPointUpdateThre: 30
    voxelTimeUpdateThre: 1.0
    minRelZ: -1.95
    maxRelZ: 0.2
    disRatioZ: 0.1
    baseFootprintFillRadius: 0.15
    baseFootprintGroundSearchRadius: 0.8
    baseFootprintGroundIntensityMax: 0.08
    baseFootprintUseLastGroundFallback: true
    baseFootprintGroundFallbackMaxAge: 2.0
    baseFootprintGroundFallbackMaxDistance: 1.5
    baseFootprintUseTfZFallback: false
    baseFootprintGroundZOffset: 0.0
    baseFootprintWarmupTime: 0.0
    baseFootprintMinGroundPointNum: 5
    baseFootprintStartMinTravelDistance: 0.0
    baseFootprintLocalFloorSearchRadius: 3.0
    baseFootprintLocalFloorHighReject: 0.25

save_terrain_map:
  ros__parameters:
    file_prefix: "terrain_map_"
    accumulate: true
    intensity_threshold: 0.05
    ground_z_range: 0.1
    ground_xy_dedup: true
    ground_xy_leaf_size: 0.05
    ground_z_layer_size: 0.15
    ground_local_layer_filter: true
    ground_local_layer_xy_bin_size: 0.5
    ground_local_layer_radius: 3.0
    ground_local_layer_z_tolerance: 0.2
    ground_local_layer_min_height: 0.6
    ground_local_layer_max_height: 1.8
    ground_local_layer_min_lower_points: 80
    ground_local_layer_min_support_ratio: 0.75
    ground_local_layer_filter_iterations: 2
    ground_local_layer_filter_on_shutdown: false
