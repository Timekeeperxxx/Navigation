# SCAN-Planner integration defaults for the Navigation workspace.
# Global path generation still comes from nav_planner using ground.pcd + footprint_fill.pcd.
# SCAN consumes /global_path as /initial_path and optimizes local B-spline trajectories
# against the live occupancy grid built from /lio/cloud_world.

scan_planner_node:
  ros__parameters:
    body_pose_topic: "/scan/body_pose"
    replan_request_topic: "/nav/replan_request"

    "fsm/navi_mode": 3
    "fsm/thresh_replan": 1.0
    "fsm/thresh_no_replan": 0.1
    # Keep the local target comfortably inside the 10x10m sliding map.  A 5m
    # target sat on the map boundary and was frequently classified as unknown.
    "fsm/planning_horizon": 3.0
    # Lift only the geometric SCAN planning start above base_footprint.  The
    # B2 controller remains planar and never commands linear.z.
    "fsm/start_height_offset": 0.30
    # A completed local lookahead is not the final destination.  Only let the
    # SCAN FSM wait for a new target after the body reaches this XY radius.
    "fsm/final_goal_tolerance": 0.10
    "fsm/emergency_time_": 1.0
    "fsm/fail_safe": true
    "fsm/max_replan_fail_count": 1000
    "fsm/is_real_world": true

    "grid_map/frame_id": "map"
    "grid_map/sliding_map_frame_id": "sliding_map"
    "grid_map/sensor_type": "lidar"
    "grid_map/cloud_is_world": true
    "grid_map/need_extrinsic": false
    # B2 body/leg returns are inside about 0.60 m of the Mid-360.  Filter them
    # before occupancy inflation while retaining nearby external obstacles.
    "grid_map/lidar_min_range": 0.70
    "grid_map/resolution": 0.05
    "grid_map/sliding_map_size_x": 10.0
    "grid_map/sliding_map_size_y": 10.0
    "grid_map/sliding_map_size_z": 3.0
    "grid_map/local_update_range_x": 5.0
    "grid_map/local_update_range_y": 5.0
    "grid_map/local_update_range_z": 1.5
    "grid_map/map_sliding_en": true
    "grid_map/map_sliding_thresh": 0.2
    # Replaces the previous Unitree Go2 collision profile backed up separately.
    # Measured from map -> base_footprint along the robot heading, place the
    # two B2 collision-circle centres about 0.225m and 0.675m behind the TF
    # origin.  center_offset is their midpoint and offset is half their gap.
    "grid_map/body_height": 0.32
    "grid_map/double_cylinder_radius": 0.25
    "grid_map/double_cylinder_offset": 0.225
    "grid_map/double_cylinder_center_offset": -0.45
    "grid_map/obstacles_inflation_z_up": 0.10
    "grid_map/obstacles_inflation_z_down": 0.33
    "grid_map/ground_height": 0.0
    "grid_map/cx": 317.19183349609375
    "grid_map/cy": 256.4806823730469
    "grid_map/fx": 609.5884399414062
    "grid_map/fy": 609.22021484375
    "grid_map/depth_filter_maxdist": 3.0
    "grid_map/depth_filter_mindist": 0.3
    "grid_map/depth_filter_margin": 1
    "grid_map/k_depth_scaling_factor": 1000.0
    "grid_map/skip_pixel": 2
    "grid_map/p_hit": 0.85
    "grid_map/p_miss": 0.30
    "grid_map/p_min": 0.12
    "grid_map/p_max": 0.98
    "grid_map/p_occ": 0.80
    "grid_map/max_ray_length": 5.0
    "grid_map/vis_height": 0.3
    "grid_map/show_occ_time": false

    "manager/max_vel": 0.35
    "manager/max_acc": 0.50
    "manager/max_jerk": 4.0
    "manager/control_points_distance": 0.20
    "manager/feasibility_tolerance": 0.5
    "manager/planning_horizon": 3.0

    "optimization/lambda_smooth": 1.0
    "optimization/lambda_collision": 1.0
    "optimization/lambda_feasibility": 0.1
    "optimization/lambda_fitness": 1.0
    "optimization/dist0": 0.20
    "optimization/max_vel": 0.35
    "optimization/vel_tolerance": 1.0
    "optimization/max_acc": 0.50
    "optimization/acc_tolerance": 1.0

closed_loop_controller:
  ros__parameters:
    body_pose_topic: "/scan/body_pose"
    execution_path_topic: "/scan/execution_path"
    execution_path_frame: "map"
    safety_execution_frozen_topic: "/planning/safety_execution_frozen"
    execution_path_publish_period: 0.2
    execution_path_sample_dt: 0.25
    time_forward: 0.8
    heading_error_threshold: 0.8
    kp_pos: 0.8
    kp_yaw: 1.5
    # Conservative B2 navigation speed; dynamic avoidance can still scale it
    # down or clamp it to zero independently.
    max_vx: 0.25
    max_vy: 0.08
    max_vyaw: 0.30
    # Unitree B2 ignores very small Move() commands even when the SDK returns
    # success. Keep the pre-safety command above its effective walking floor;
    # dynamic avoidance remains downstream and can still scale or stop it.
    min_translation_speed: 0.15
    finish_dist: 0.10
    enable_final_yaw: true
    final_yaw_tolerance: 0.10
